name: Bug report
description: Report a reproducible defect in bmm-publisher.
title: "bug: "
labels:
  - bug
body:
  - type: markdown
    attributes:
      value: |
        Thanks for filing a bug report. Please provide enough detail to reproduce the issue.
  - type: textarea
    id: summary
    attributes:
      label: Summary
      description: What happened?
      placeholder: A concise description of the bug.
    validations:
      required: true
  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      description: Include exact steps and code snippets.
      placeholder: |
        1. Run bmm-publisher publish:asciidoc ...
        2. Observe...
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
    validations:
      required: true
  - type: input
    id: php-version
    attributes:
      label: PHP version
      placeholder: 8.4.x
    validations:
      required: true
  - type: input
    id: version
    attributes:
      label: Version / commit / Docker image tag
      placeholder: 1.2.3, abc1234, or ghcr.io/openehr/bmm-publisher:1.2.3
    validations:
      required: true
