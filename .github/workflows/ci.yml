name: CI

on:
  pull_request:
    branches:
      - main
  push:
    branches:
      - main

permissions:
  contents: read

jobs:
  validate:
    name: Validate (PHP ${{ matrix.php-version }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        php-version: ['8.5']

    steps:
      - uses: actions/checkout@v6

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ matrix.php-version }}
          extensions: json
          coverage: none

      - name: Cache Composer dependencies
        uses: actions/cache@v5
        with:
          path: |
            ~/.composer/cache/files
            ~/.cache/composer/files
          key: ${{ runner.os }}-composer-php${{ matrix.php-version }}-${{ hashFiles('**/composer.json') }}
          restore-keys: |
            ${{ runner.os }}-composer-php${{ matrix.php-version }}-

      - name: Validate composer.json
        run: composer validate --strict

      - name: Install dependencies
        run: composer install --prefer-dist --no-interaction --no-progress --ignore-platform-req=ext-xdebug

      - name: Linting
        run: composer check:lint

      - name: Coding style
        run: composer check:cs

      - name: Static analysis
        run: composer check:phpstan

      - name: Unit tests
        run: composer test

      - name: Build production Docker image
        uses: docker/build-push-action@v7
        with:
          context: .
          file: .docker/Dockerfile
          target: production
          push: false

  verify-output:
    name: Verify generated output is up-to-date
    runs-on: ubuntu-latest
    needs: validate
    steps:
      - uses: actions/checkout@v6

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build dev image
        # Align the container's app user with the runner's uid/gid so the bind-mounted
        # /app workspace is writable from inside the container (composer install, output
        # regeneration, git diff all run as that user).
        run: |
          docker compose -f .docker/docker-compose.yml build \
            --build-arg uid=$(id -u) --build-arg gid=$(id -g)

      - name: Install PHP dependencies
        run: make install

      - name: Install PHP dependencies
        run: make install

      - name: Regenerate output
        run: make publish-all

      - name: Fail on drift
        run: |
          if ! git diff --quiet --exit-code -- output/; then
            echo "::error::Committed output is stale — run 'make publish-all' locally and commit."
            git --no-pager diff --stat -- output/
            exit 1
          fi
