        post_conditions:
          Post_de_Morgan: 'Result = not (not self and not other)'
          Post_commutative: 'Result = (other or Current)'
          Post_consistent_with_semi_strict: 'Result implies (self or else other)'
        result: !P_BMM_SIMPLE_TYPE
