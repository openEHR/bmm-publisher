        parameters:
          other: !P_BMM_SINGLE_FUNCTION_PARAMETER
            name: other
            type: Boolean
        post_conditions:
          Post_de_Morgan: 'Result = not (not self and then not other)'
        result: !P_BMM_SIMPLE_TYPE
          type: Boolean
      'infix xor':
        name: 'infix xor'
        documentation: "Boolean exclusive or with `other'."
        parameters:
          other: !P_BMM_SINGLE_FUNCTION_PARAMETER
            name: other
            type: Boolean
        post_conditions:
          Post_definition: 'Result = ((self or other) and not (self and other))'
        result: !P_BMM_SIMPLE_TYPE
          type: Boolean
      'infix implies':
        name: 'infix implies'
        documentation: "Boolean implication of `other' (semi-strict)"
        parameters:
          other: !P_BMM_SINGLE_FUNCTION_PARAMETER
            name: other
            type: Boolean
        post_conditions:
          Post_definition: 'Result = (not self or else other)'
