        type: String
    functions:
      is_partial:
        name: is_partial
        documentation: 'True if this date time is partial, i.e. if trailing end (right hand) value(s) is/are missing.'
        is_abstract: true
        result: !P_BMM_SIMPLE_TYPE
          type: Boolean
      is_extended:
        name: is_extended
        documentation: "True if this ISO8601 string is in the 'extended' form, i.e. uses ‘-’ and / or ‘:’ separators. This is the preferred format."
        is_abstract: true
        result: !P_BMM_SIMPLE_TYPE
          type: Boolean
  Iso8601_date:
    name: Iso8601_date
    documentation: |-
      Represents an ISO 8601 date, including partial and extended forms. Value may be:

      * `YYYY-MM-DD` (extended, preferred)
      * `YYYYMMDD` (compactd)
      * a partial invariant.

      See `Time_definitions._valid_iso8601_date()_` for validity.
    ancestors:
      - Iso8601_type
    functions:
      year:
        name: year
        documentation: Year.
        result: !P_BMM_SIMPLE_TYPE
          type: Integer
      month:
        name: month
        documentation: 'Month in year.'
        pre_conditions:
          Pre: 'not month_unknown'
        result: !P_BMM_SIMPLE_TYPE
          type: Integer
      day:
        name: day
        documentation: 'Day in month.'
        pre_conditions:
          Pre: 'not day_unknown'
        result: !P_BMM_SIMPLE_TYPE
          type: Integer
      timezone:
        name: timezone
        documentation: 'Timezone; may be Void.'
        result: !P_BMM_SIMPLE_TYPE
          type: Iso8601_timezone
      month_unknown:
        name: month_unknown
        documentation: 'Indicates whether month in year is unknown. If so, the date is of the form `"YYYY"`.'
        result: !P_BMM_SIMPLE_TYPE
          type: Boolean
      day_unknown:
        name: day_unknown
        documentation: 'Indicates whether day in month is unknown. If so, and month is known, the date is of the form `"YYYY-MM"` or `"YYYYMM"`.'
        result: !P_BMM_SIMPLE_TYPE
          type: Boolean
      is_partial:
        name: is_partial
        documentation: 'True if this date is partial, i.e. if days or more is missing.'
        result: !P_BMM_SIMPLE_TYPE
          type: Boolean
      is_extended:
        name: is_extended
        documentation: "True if this date uses `'-'` separators."
        result: !P_BMM_SIMPLE_TYPE
          type: Boolean
      as_string:
        name: as_string
        documentation: 'Return string value in extended format.'
        result: !P_BMM_SIMPLE_TYPE
          type: String
    invariants:
      Year_valid: 'valid_year (year)'
      Month_valid: 'not month_unknown implies valid_month (month)'
      Day_valid: 'not day_unknown implies valid_day (year, month, day)'
      Partial_validity: 'month_unknown implies day_unknown'
  Temporal:
    name: Temporal
    documentation: 'Abstract ancestor of time-related classes.'
    is_abstract: true
    ancestors:
      - Ordered
  Multiplicity_interval:
    name: Multiplicity_interval
    documentation: 'An Interval of Integer, used to represent multiplicity, cardinality and optionality in models. '
    ancestors:
      - Proper_interval
    constants:
      Multiplicity_range_marker:
        name: Multiplicity_range_marker
        documentation: 'Marker to use in string form of interval between limits.'
        type: String
        value: '".."'
      Multiplicity_unbounded_marker:
        name: Multiplicity_unbounded_marker
        documentation: 'Symbol to use to indicate upper limit unbounded.'
        type: Character
        value: "'*'"
    functions:
      is_open:
        name: is_open
        documentation: 'True if this interval imposes no constraints, i.e. is set to `0..*`.'
        result: !P_BMM_SIMPLE_TYPE
          type: Boolean
      is_optional:
        name: is_optional
        documentation: 'True if this interval expresses optionality, i.e. `0..1`.'
        result: !P_BMM_SIMPLE_TYPE
          type: Boolean
      is_mandatory:
        name: is_mandatory
        documentation: 'True if this interval expresses mandation, i.e. `1..1`.'
        result: !P_BMM_SIMPLE_TYPE
          type: Boolean
      is_prohibited:
        name: is_prohibited
        documentation: 'True if this interval is set to `0..0`.'
        result: !P_BMM_SIMPLE_TYPE
          type: Boolean
  Interval:
    name: Interval
    documentation: 'Interval abstraction, featuring upper and lower limits that may be open or closed, included or not included.'
    ancestors:
      - Any
    generic_parameter_defs:
      T:
        name: T
        conforms_to_type: Ordered
    properties:
      lower: !P_BMM_SINGLE_PROPERTY_OPEN
        name: lower
        documentation: 'Lower bound.'
        type: T
      upper: !P_BMM_SINGLE_PROPERTY_OPEN
        name: upper
        documentation: 'Upper bound.'
        type: T
      lower_unbounded: !P_BMM_SINGLE_PROPERTY
        name: lower_unbounded
        documentation: '`lower` boundary open (i.e. = -infinity).'
        is_mandatory: true
        type: Boolean
      upper_unbounded: !P_BMM_SINGLE_PROPERTY
        name: upper_unbounded
        documentation: '`upper` boundary open (i.e. = +infinity).'
        is_mandatory: true
        type: Boolean
      lower_included: !P_BMM_SINGLE_PROPERTY
        name: lower_included
        documentation: '`lower` boundary value included in range if not `lower_unbounded`.'
        is_mandatory: true
        type: Boolean
      upper_included: !P_BMM_SINGLE_PROPERTY
        name: upper_included
        documentation: '`upper` boundary value included in range if not `upper_unbounded`.'
        is_mandatory: true
        type: Boolean
    functions:
      has:
        name: has
        documentation: 'True if `(lower_unbounded or lower_included and v >= lower) or v > lower and (upper_unbounded or upper_included and v <= upper or v < upper)`.'
        parameters:
          e: !P_BMM_SINGLE_FUNCTION_PARAMETER_OPEN
            name: e
            type: T
        result: !P_BMM_SIMPLE_TYPE
          type: Boolean
      intersects:
        name: intersects
        documentation: "True if there is any overlap between intervals represented by Current and `other'. True if at least one limit of other is strictly inside the limits of this interval."
        parameters:
          other: !P_BMM_SINGLE_FUNCTION_PARAMETER
            name: other
            type: Interval
        result: !P_BMM_SIMPLE_TYPE
          type: Boolean
      contains:
        name: contains
        documentation: 'True if current interval properly contains `other`? True if all points of `other` are inside the current interval.'
        parameters:
          other: !P_BMM_SINGLE_FUNCTION_PARAMETER
            name: other
            type: Interval
        result: !P_BMM_SIMPLE_TYPE
          type: Boolean
      is_equal:
        name: is_equal
        documentation: "True if current object's interval is semantically same as `other`."
        parameters:
          other: !P_BMM_SINGLE_FUNCTION_PARAMETER
            name: other
            type: Any
        result: !P_BMM_SIMPLE_TYPE
          type: Boolean
    invariants:
      Lower_included_valid: 'lower_unbounded implies not lower_included'
      Upper_included_valid: 'upper_unbounded implies not upper_included'
      Limits_consistent: '(not upper_unbounded and not lower_unbounded) implies lower <= upper'
      Limits_comparable: '(not upper_unbounded and not lower_unbounded) implies lower.strictly_comparable_to (upper)'
  Cardinality:
    name: Cardinality
    documentation: 'Express constraints on the cardinality of container objects which are the values of multiply-valued attributes, including uniqueness and ordering, providing the means to state that a container acts like a logical list, set or bag.'
    properties:
      interval: !P_BMM_SINGLE_PROPERTY
        name: interval
        documentation: 'The interval of this cardinality. '
        is_mandatory: true
        type: Multiplicity_interval
      is_ordered: !P_BMM_SINGLE_PROPERTY
        name: is_ordered
        documentation: 'True if the members of the container attribute to which this cardinality refers are ordered. '
        is_mandatory: true
        type: Boolean
      is_unique: !P_BMM_SINGLE_PROPERTY
        name: is_unique
        documentation: 'True if the members of the container attribute to which this cardinality refers are unique.'
        is_mandatory: true
        type: Boolean
    functions:
      is_bag:
        name: is_bag
        documentation: 'True if the semantics of this cardinality represent a bag, i.e. unordered, non-unique membership.'
        result: !P_BMM_SIMPLE_TYPE
          type: Boolean
      is_list:
        name: is_list
        documentation: 'True if the semantics of this cardinality represent a list, i.e. ordered, non-unique membership.'
        result: !P_BMM_SIMPLE_TYPE
          type: Boolean
      is_set:
        name: is_set
        documentation: 'True if the semantics of this cardinality represent a set, i.e. unordered, unique membership.'
        result: !P_BMM_SIMPLE_TYPE
          type: Boolean
  Terminology_code:
    name: Terminology_code
    documentation: 'Logically primitive type representing a reference to a terminology concept, in the form of a terminology identifier, optional version, and a code or code string from the terminology.'
    ancestors:
      - Any
    properties:
      terminology_id: !P_BMM_SINGLE_PROPERTY
        name: terminology_id
        documentation: 'The archetype environment namespace identifier used to identify a terminology. Typically a value like `"snomed_ct"` that is mapped elsewhere to the full URI identifying the terminology.'
        is_mandatory: true
        type: String
      terminology_version: !P_BMM_SINGLE_PROPERTY
        name: terminology_version
        documentation: 'Optional string value representing terminology version, typically a date or dotted numeric.'
        type: String
      code_string: !P_BMM_SINGLE_PROPERTY
        name: code_string
        documentation: 'A terminology code or post-coordinated code expression, if supported by the terminology. The code may refer to a single term, a value set consisting of multiple terms, or some other entity representable within the terminology.'
        is_mandatory: true
        type: String
      uri: !P_BMM_SINGLE_PROPERTY
        name: uri
        documentation: 'The URI reference that may be used as a concrete key into a notional terminology service for queries that can obtain the term text, definition, and other associated elements.'
        type: Uri
  Terminology_term:
    name: Terminology_term
    documentation: 'Leaf type representing a term from a terminology, which consists of the term text and the code, i.e. a concept reference.'
    ancestors:
      - Any
    properties:
      concept: !P_BMM_SINGLE_PROPERTY
        name: concept
        documentation: 'Refrence to the terminology concept formally representing this term.'
        is_mandatory: true
        type: Terminology_code
      text: !P_BMM_SINGLE_PROPERTY
        name: text
        documentation: 'Text of term.'
        is_mandatory: true
        type: String
class_definitions:
  ARCHETYPE_ID:
    name: ARCHETYPE_ID
    documentation: |-
      Identifier for archetypes. Ideally these would identify globally unique archetypes.
      Lexical form: `rm_originator  '-' rm_name  '-' rm_entity  '.' concept_name {  '-' specialisation }*  '.v' number`.
    ancestors:
      - OBJECT_ID
    functions:
      qualified_rm_entity:
        name: qualified_rm_entity
        documentation: 'Globally qualified reference model entity, e.g.  `openehr-EHR-OBSERVATION`.'
        result: !P_BMM_SIMPLE_TYPE
          type: String
      domain_concept:
        name: domain_concept
        documentation: 'Name of the concept represented by this archetype, including specialisation, e.g. `Biochemistry_result-cholesterol`. '
        result: !P_BMM_SIMPLE_TYPE
          type: String
      rm_originator:
        name: rm_originator
        documentation: 'Organisation originating the reference model on which this archetype is based, e.g. openehr,  cen,  hl7 . '
        result: !P_BMM_SIMPLE_TYPE
          type: String
      rm_name:
        name: rm_name
        documentation: 'Name of the reference model, e.g. rim,  ehr_rm,  en13606 . '
        result: !P_BMM_SIMPLE_TYPE
          type: String
      rm_entity:
        name: rm_entity
        documentation: 'Name of the ontological level within the reference model to which this archetype is targeted, e.g. for openEHR,  folder ,  composition ,  section ,  entry .'
        result: !P_BMM_SIMPLE_TYPE
          type: String
      specialisation:
        name: specialisation
        documentation: 'Name of specialisation of concept, if this archetype is a specialisation of another archetype, e.g.  cholesterol .'
        result: !P_BMM_SIMPLE_TYPE
          type: String
      version_id:
        name: version_id
        documentation: |
          Version of this archetype. 
        result: !P_BMM_SIMPLE_TYPE
          type: String
  GENERIC_ID:
    name: GENERIC_ID
    documentation: 'Generic identifier type for identifiers whose format is otherwise unknown to openEHR. Includes an attribute for naming the identification scheme (which may well be local). '
    ancestors:
      - OBJECT_ID
    properties:
      scheme: !P_BMM_SINGLE_PROPERTY
        name: scheme
        documentation: 'Name of the scheme to which this identifier conforms. Ideally this name will be recognisable globally but realistically it may be a local ad hoc scheme whose name is not controlled or standardised in any way. '
        is_mandatory: true
        type: String
  HIER_OBJECT_ID:
    name: HIER_OBJECT_ID
    documentation: 'Concrete type corresponding to hierarchical identifiers of the form defined by UID_BASED_ID. '
    ancestors:
      - UID_BASED_ID
  LOCATABLE_REF:
    name: LOCATABLE_REF
    documentation: 'Purpose Reference to a `LOCATABLE` instance inside the top-level content structure inside a `VERSION<T>`; the path attribute is applied to the object that `VERSION._data_` points to. '
    ancestors:
      - OBJECT_REF
    properties:
      path: !P_BMM_SINGLE_PROPERTY
        name: path
        documentation: 'The path to an instance in question, as an absolute path with respect to the object found at `VERSION._data_`. An empty path means that the object referred to by id being specified. '
        type: String
      id: !P_BMM_SINGLE_PROPERTY
        name: id
        documentation: 'Globally unique id of an object, regardless of where it is stored.'
        is_mandatory: true
        type: UID_BASED_ID
    functions:
      as_uri:
        name: as_uri
        documentation: |
          A URI form of the reference, created by concatenating the following: 

          * scheme, e.g. `ehr:`, derived from `_namespace_`
          * `_id.value_`
          * `/` + `_path_`, where `_path_` is non-empty
        result: !P_BMM_SIMPLE_TYPE
          type: String
  OBJECT_ID:
    name: OBJECT_ID
    documentation: |-
      Ancestor class of identifiers of informational objects. Ids may be completely meaningless, in which case their only job is to refer to something, or may carry some information to do with the identified object. 

      Object ids are used inside an object to identify that object. To identify another object in another service, use an `OBJECT_REF`, or else use a UID for local objects identified by UID. If none of the subtypes is suitable, direct instances of this class may be used. 
    is_abstract: true
    properties:
      value: !P_BMM_SINGLE_PROPERTY
        name: value
        documentation: 'The value of the id in the form defined below. '
        is_mandatory: true
        type: String
  OBJECT_REF:
    name: OBJECT_REF
    documentation: 'Class describing a reference to another object, which may exist locally or be maintained outside the current namespace, e.g. in another service. Services are usually external, e.g. available in a LAN (including on the same host) or the internet via Corba, SOAP, or some other distributed protocol. However, in small systems they may be part of the same executable as the data containing the Id. '
    properties:
      namespace: !P_BMM_SINGLE_PROPERTY
        name: namespace
        documentation: |
          Namespace to which this identifier belongs in the local system context (and possibly in any other openEHR compliant environment) e.g.  terminology ,  demographic . These names are not yet standardised. Legal values for `_namespace_` are:

          * `"local"`
          * `"unknown"`
          * a string matching the regex `[a-zA-Z][a-zA-Z0-9_-:/&+?]*`
        is_mandatory: true
        type: String
      type: !P_BMM_SINGLE_PROPERTY
        name: type
        documentation: 'Name of the  class (concrete or abstract) of object to which this identifier type refers, e.g. `PARTY`, `PERSON`,  `GUIDELINE`  etc. These class names are from the relevant reference model. The type name `ANY` can be used to indicate that any type is accepted (e.g. if the type is unknown). '
        is_mandatory: true
        type: String
      id: !P_BMM_SINGLE_PROPERTY
        name: id
        documentation: 'Globally unique id of an object, regardless of where it is stored.'
        is_mandatory: true
        type: OBJECT_ID
  OBJECT_VERSION_ID:
    name: OBJECT_VERSION_ID
    documentation: "Globally unique identifier for one version of a versioned object; lexical form: `object_id  '::' creating_system_id  '::' version_tree_id`."
    ancestors:
      - UID_BASED_ID
    functions:
      object_id:
        name: object_id
        documentation: 'Unique identifier for logical object of which this identifier identifies one version; normally the `_object_id_` will be the unique identifier of the version container containing the version referred to by this `OBJECT_VERSION_ID` instance. '
        result: !P_BMM_SIMPLE_TYPE
          type: UID
      version_tree_id:
        name: version_tree_id
        documentation: 'Tree identifier of this version with respect to other versions in the same version tree, as either 1 or 3 part dot-separated numbers, e.g.  1 ,  2.1.4 . '
        result: !P_BMM_SIMPLE_TYPE
          type: VERSION_TREE_ID
      creating_system_id:
        name: creating_system_id
        documentation: 'Identifier of the system that created the Version corresponding to this Object version id.'
        result: !P_BMM_SIMPLE_TYPE
          type: UID
      is_branch:
        name: is_branch
        documentation: 'True if this version identifier represents a branch.'
        result: !P_BMM_SIMPLE_TYPE
          type: Boolean
  PARTY_REF:
    name: PARTY_REF
    documentation: 'Identifier for parties in a demographic or identity service. There are typically a number of subtypes of the `PARTY` class, including `PERSON`, `ORGANISATION`, etc. Abstract supertypes are allowed if the referenced object is of a type not known by the current implementation of this class (in other words, if the demographic model is changed by the addition of a new `PARTY` or `ACTOR` subtypes, valid `PARTY_REFs` can still be constructed to them). '
    ancestors:
      - OBJECT_REF
    invariants:
      Type_validity: 'type.is_equal(“PERSON”) or type.is_equal(“ORGANISATION”) or type.is_equal(“GROUP”) or type.is_equal(“AGENT”)or type.is_equal(“ROLE”) or type.is_equal(“PARTY”) or type.is_equal(“ACTOR”)'
  TERMINOLOGY_ID:
    name: TERMINOLOGY_ID
    documentation: |
      Identifier for terminologies such as accessed via a terminology query service. In this class, the value attribute identifies the Terminology in the terminology service, e.g.  SNOMED-CT . A terminology is assumed to be in a particular language, which must be explicitly specified.

      The value if the id attribute is the precise terminology id identifier, including actual release (i.e. actual  version), local modifications etc; e.g. ICPC2.

      Lexical form: `name [  '(' version  ')' ]`.
    ancestors:
      - OBJECT_ID
    functions:
      name:
        name: name
        documentation: 'Return the terminology id (which includes the  version  in some cases). Distinct names correspond to distinct (i.e. non-compatible) terminologies. Thus the names  ICD10AM  and  ICD10  refer to distinct terminologies. '
        result: !P_BMM_SIMPLE_TYPE
          type: String
      version_id:
        name: version_id
        documentation: 'Version of this terminology, if versioning supported, else the empty string. '
        result: !P_BMM_SIMPLE_TYPE
          type: String
  VERSION_TREE_ID:
    name: VERSION_TREE_ID
    documentation: |-
      Version tree identifier for one version. Lexical form: 

      `trunk_version [  '.' branch_number  '.' branch_version ]`
    properties:
      value: !P_BMM_SINGLE_PROPERTY
        name: value
        documentation: 'String form of this identifier.'
        is_mandatory: true
        type: String
    functions:
      trunk_version:
        name: trunk_version
        documentation: 'Trunk version number; numbering starts at 1. '
        result: !P_BMM_SIMPLE_TYPE
          type: String
      is_branch:
        name: is_branch
        documentation: 'True if this version identifier represents a branch, i.e. has branch_number and branch_version parts.'
        result: !P_BMM_SIMPLE_TYPE
          type: Boolean
      branch_number:
        name: branch_number
        documentation: 'Number of branch from the trunk point; numbering starts at 1. '
        result: !P_BMM_SIMPLE_TYPE
          type: String
      branch_version:
        name: branch_version
        documentation: 'Version of the branch; numbering starts at 1. '
        result: !P_BMM_SIMPLE_TYPE
          type: String
    invariants:
      Value_valid: 'not value.is_empty'
      Trunk_version_valid: 'trunk_version /= Void and then trunk_version.is_integer and then trunk_version.as_integer >= 1'
      Branch_number_valid: 'branch_number /= Void implies branch_number.is_integer and then branch_number.as_integer >= 1'
      Branch_version_valid: 'branch_version /= Void implies branch_version.is_integer and then branch_version.as_integer >= 1'
      Branch_validity: '(branch_number = Void and branch_version = Void ) xor (branch_number /= Void and branch_version /= Void )'
      Is_branch_validity: 'is_branch xor branch_number = Void'
      Is_first_validity: 'not is_first xor trunk_version.is_equal(“1”)'
  UID_BASED_ID:
    name: UID_BASED_ID
    documentation: |-
      Abstract model of UID-based identifiers consisting of a root part and an optional extension;

      lexical form: `root '::' extension`.
    is_abstract: true
    ancestors:
      - OBJECT_ID
    functions:
      root:
        name: root
        documentation: "The identifier of the conceptual namespace in which the object exists, within the identification scheme. Returns the part to the left of the first '::' separator, if any, or else the whole string. "
        result: !P_BMM_SIMPLE_TYPE
          type: UID
      extension:
        name: extension
        documentation: "Optional local identifier of the object within the context of the root identifier. Returns the part to the right of the first '::' separator if any, or else any empty String."
        result: !P_BMM_SIMPLE_TYPE
          type: String
      has_extension:
        name: has_extension
        documentation: 'True if `_extension_ /= Void`.'
        result: !P_BMM_SIMPLE_TYPE
          type: Boolean
    invariants:
      Has_extension_valid: 'extension.is_empty xor has_extension'
  UUID:
    name: UUID
    documentation: 'Model of the DCE Universal Unique Identifier or UUID which takes the form of hexadecimal integers separated by hyphens, following the pattern 8-4-4-4-12 as defined by the Open Group, CDE 1.1 Remote Procedure Call specification, Appendix A. Also known as a GUID.'
    ancestors:
      - UID
  INTERNET_ID:
    name: INTERNET_ID
    documentation: 'Model of a reverse internet domain, as used to uniquely identify an internet domain. In the form of a dot-separated string in the reverse order of a domain name, specified by http://www.ietf.org/rfc/rfc1034.txt[IETF RFC 1034^]. '
    ancestors:
      - UID
  UID:
    name: UID
    documentation: 'Abstract parent of classes representing unique identifiers which identify information entities in a durable way. UIDs only ever identify one IE in time or space and are never re-used.'
    is_abstract: true
    properties:
      value: !P_BMM_SINGLE_PROPERTY
        name: value
        documentation: 'The value of the id.'
        is_mandatory: true
        type: String
    invariants:
      Value_valid: 'not value.empty'
  ISO_OID:
    name: ISO_OID
    documentation: "Model of ISO's Object Identifier (oid) as defined by the standard ISO/IEC 8824. Oids are formed from integers separated by dots. Each non-leaf node in an Oid starting from the left corresponds to an assigning authority, and identifies that authority's namespace, inside which the remaining part of the identifier is locally unique. "
    ancestors:
      - UID
  TEMPLATE_ID:
    name: TEMPLATE_ID
    documentation: 'Identifier for templates. Lexical form to be determined.'
    ancestors:
      - OBJECT_ID
  ACCESS_GROUP_REF:
    name: ACCESS_GROUP_REF
    documentation: 'Reference to access group in an access control service.'
    ancestors:
      - OBJECT_REF
    invariants:
      Type_validity: 'type.is_equal (“ACCESS_GROUP”)'
  OPENEHR_DEFINITIONS:
    name: OPENEHR_DEFINITIONS
    documentation: 'Inheritance class to provide access to constants defined in other packages.'
    ancestors:
      - BASIC_DEFINITIONS
    constants:
      Local_terminology_id:
        name: Local_terminology_id
        documentation: 'Predefined terminology identifier to indicate it is local to the knowledge resource in which it occurs, e.g. an archetype'
        type: String
        value: '"local"'
  BASIC_DEFINITIONS:
    name: BASIC_DEFINITIONS
    documentation: 'Defines globally used constant values.'
    constants:
      CR:
        name: CR
        documentation: 'Carriage return character.'
        type: Character
        value: "'\\015'"
      LF:
        name: LF
        documentation: 'Line feed character.'
        type: Character
        value: "'\\012'"
      Any_type:
        name: Any_type
        type: String
        value: '"Any"'
      Regex_any_pattern:
        name: Regex_any_pattern
        type: String
        value: '".*"'
      Default_encoding:
        name: Default_encoding
        type: String
        value: '"UTF-8"'
  VALIDITY_KIND: !P_BMM_ENUMERATION_STRING
    name: VALIDITY_KIND
    documentation: |-
      An enumeration of three values that may commonly occur in constraint models.

      Use as the type of any attribute within this model, which expresses constraint on some attribute in a class in a reference model. For example to indicate validity
      of Date/Time fields.
    ancestors:
      - String
    item_names:
      - mandatory
      - optional
      - prohibited
    item_documentations:
      - 'Constant to indicate mandatory presence of something.'
      - 'Constant to indicate optional presence of something.'
      - 'Constant to indicate disallowed presence of something.'
  VERSION_STATUS: !P_BMM_ENUMERATION_STRING
    name: VERSION_STATUS
    documentation: 'Status of a versioned artefact, as one of a number of possible values: uncontrolled, prerelease, release, build.'
    ancestors:
      - String
    item_names:
      - alpha
      - beta
      - release_candidate
      - released
      - build
    item_documentations:
      - "Value representing a version which is 'unstable', i.e. contains an unknown size of change with respect to its base version. Rendered with the build number as a string in the form `N.M.P-alpha.B` e.g. `2.0.1-alpha.154`."
      - "Value representing a version which is 'beta', i.e. contains an unknown but reducing size of change with respect to its base version. Rendered with the build number as a string in the form `N.M.P-beta.B` e.g. `2.0.1-beta.154`."
      - "Value representing a version which is 'release candidate', i.e. contains only patch-level changes on the base version. Rendered as a string as `N.M.P-rc.B` e.g. `2.0.1-rc.27`."
      - "Value representing a version which is 'released', i.e. is the definitive base version. Rendered with the build number as a string in the form `N.M.P` e.g. `2.0.1`."
      - 'Value representing a version which is a build of the current base release. Rendered with the build number as a string in the form `N.M.P+B` e.g. `2.0.1+33`.'
  Comparable:
    name: Comparable
    is_abstract: true
  TUPLE:
    name: TUPLE
    documentation: 'Parent type of all TUPLE types.'
  FUNCTION:
    name: FUNCTION
    documentation: 'Type representing a function with a return type and 0 or more arguments represented as a TUPLE.'
    ancestors:
      - ROUTINE
    generic_parameter_defs:
      ARGS:
        name: ARGS
        conforms_to_type: TUPLE
      RESULT:
        name: RESULT
        conforms_to_type: Any
  TUPLE1:
    name: TUPLE1
    documentation: 'A Tuple type used, among other things, for representing a single typed argument within a Routine signature.'
    ancestors:
      - TUPLE
    generic_parameter_defs:
      A:
        name: A
        conforms_to_type: Any
  TUPLE2:
    name: TUPLE2
    documentation: 'A Tuple type used, among other things, for representing two typed arguments within a Routine signature.'
    ancestors:
      - TUPLE
    generic_parameter_defs:
      A:
        name: A
        conforms_to_type: Any
      B:
        name: B
        conforms_to_type: Any
  ROUTINE:
    name: ROUTINE
    documentation: 'Type representing a function with a return type and 0 or more arguments represented as a TUPLE.'
    generic_parameter_defs:
      ARGS:
        name: ARGS
        conforms_to_type: TUPLE
  PROCEDURE:
    name: PROCEDURE
    documentation: 'Type representing a procedure with 0 or more arguments represented as a TUPLE.'
    ancestors:
      - ROUTINE
    generic_parameter_defs:
      ARGS:
        name: ARGS
        conforms_to_type: TUPLE
  Iso8601_timezone:
    name: Iso8601_timezone
    documentation: |
      ISO8601 timezone string, in format:

      * `Z | ±hh[mm]`

      where:

      * `hh` is "00" - "23" (0-filled to two digits)
      * `mm` is "00" - "59" (0-filled to two digits)
      * `Z` is a literal meaning UTC (modern replacement for GMT), i.e. timezone `+0000`
    ancestors:
      - Iso8601_type
    functions:
      hour:
        name: hour
        documentation: 'Hour part of timezone - in the range 00 - 13.'
        result: !P_BMM_SIMPLE_TYPE
          type: Integer
      minute:
        name: minute
        documentation: 'Minute part of timezone. Generally 00 or 30.'
        result: !P_BMM_SIMPLE_TYPE
          type: Integer
      sign:
        name: sign
        documentation: 'Direction of timezone expresssed as +1 or -1.'
        result: !P_BMM_SIMPLE_TYPE
          type: Integer
      minute_unknown:
        name: minute_unknown
        documentation: 'Indicates whether minute part known.'
        result: !P_BMM_SIMPLE_TYPE
          type: Boolean
      is_partial:
        name: is_partial
        documentation: 'True if this time zone is partial, i.e. if minutes is missing.'
        result: !P_BMM_SIMPLE_TYPE
          type: Boolean
      is_extended:
        name: is_extended
        documentation: 'True if this time-zone uses ‘:’ separators.'
        result: !P_BMM_SIMPLE_TYPE
          type: Boolean
      is_gmt:
        name: is_gmt
        documentation: 'True if timezone is UTC, i.e. +0000.'
        result: !P_BMM_SIMPLE_TYPE
          type: Boolean
      as_string:
        name: as_string
        documentation: 'Return timezone string.'
        result: !P_BMM_SIMPLE_TYPE
          type: String
    invariants:
      Min_hour_valid: 'sign = -1 implies hour > 0 and hour <= Min_timezone_hour'
      Max_hour_valid: 'sign = 1 implies hour > 0 and hour <= Max_timezone_hour'
      Minute_valid: 'not minute_unknown implies valid_minute (minute)'
      Sign_valid: 'sign = 1 or sign = -1'
  Time_Definitions:
    name: Time_Definitions
    documentation: 'Definitions for date/time classes. Note that the timezone limits are set by where the international dateline is. Thus, time in New Zealand is quoted using `+12:00`, not `-12:00`.'
    constants:
      Seconds_in_minute:
        name: Seconds_in_minute
        type: Integer
        value: 60
      Minutes_in_hour:
        name: Minutes_in_hour
        type: Integer
        value: 60
      Hours_in_day:
        name: Hours_in_day
        type: Integer
        value: 24
      Nominal_days_in_month:
        name: Nominal_days_in_month
        documentation: 'Used for conversions of durations containing months to days and / or seconds.'
        type: Real
        value: 30.42
      Max_days_in_month:
        name: Max_days_in_month
        type: Integer
        value: 31
      Days_in_year:
        name: Days_in_year
        type: Integer
        value: 365
      Days_in_leap_year:
        name: Days_in_leap_year
        type: Integer
        value: 366
      Max_days_in_year:
        name: Max_days_in_year
        type: Integer
        value: Days_in_leap_year
      Nominal_days_in_year:
        name: Nominal_days_in_year
        documentation: 'Used for conversions of durations containing years to days and / or seconds.'
        type: Real
        value: 365.24
      Days_in_week:
        name: Days_in_week
        type: Integer
        value: 7
      Months_in_year:
        name: Months_in_year
        type: Integer
        value: 12
      Min_timezone_hour:
        name: Min_timezone_hour
        documentation: 'Minimum hour value of a timezone (note that the -ve sign is supplied in the ISO8601_TIMEZONE class).'
        type: Integer
        value: 12
      Max_timezone_hour:
        name: Max_timezone_hour
        type: Integer
        value: 13
    functions:
      valid_year:
        name: valid_year
        parameters:
          'y': !P_BMM_SINGLE_FUNCTION_PARAMETER
            name: 'y'
            type: Integer
        post_conditions:
          Post: 'Result = y >= 0'
        result: !P_BMM_SIMPLE_TYPE
          type: Boolean
      valid_month:
        name: valid_month
        parameters:
          m: !P_BMM_SINGLE_FUNCTION_PARAMETER
            name: m
            type: Integer
        post_conditions:
          Post: 'Result = m >= 1 and m <= Months_in_year'
        result: !P_BMM_SIMPLE_TYPE
          type: Boolean
      valid_day:
        name: valid_day
        documentation: 'True if d >= 1 and d <= days_in_month (m, y)'
        parameters:
          'y': !P_BMM_SINGLE_FUNCTION_PARAMETER
            name: 'y'
            type: Integer
          m: !P_BMM_SINGLE_FUNCTION_PARAMETER
            name: m
            type: Integer
          d: !P_BMM_SINGLE_FUNCTION_PARAMETER
            name: d
            type: Integer
        post_conditions:
          Post: 'Result = d >= 1 and d <= days_in_month (m, y)'
        result: !P_BMM_SIMPLE_TYPE
          type: Boolean
      valid_hour:
        name: valid_hour
        documentation: 'True if (h >= 0 and h < Hours_in_day) or (h = Hours_in_day and m = 0 and s = 0)'
        parameters:
          h: !P_BMM_SINGLE_FUNCTION_PARAMETER
            name: h
            type: Integer
          m: !P_BMM_SINGLE_FUNCTION_PARAMETER
            name: m
            type: Integer
          s: !P_BMM_SINGLE_FUNCTION_PARAMETER
            name: s
            type: Integer
        post_conditions:
          Post: 'Result = (h >= 0 and h < Hours_in_day) or (h = Hours_in_day and m = 0 and s = 0)'
        result: !P_BMM_SIMPLE_TYPE
          type: Boolean
      valid_minute:
        name: valid_minute
        documentation: 'True if m >= 0 and m < Minutes_in_hour.'
        parameters:
          m: !P_BMM_SINGLE_FUNCTION_PARAMETER
            name: m
            type: Integer
        post_conditions:
          Post: 'Result = m >= 0 and m < Minutes_in_hour'
        result: !P_BMM_SIMPLE_TYPE
          type: Boolean
      valid_second:
        name: valid_second
        documentation: 'True if s >= 0 and s < Seconds_in_minute .'
        parameters:
          s: !P_BMM_SINGLE_FUNCTION_PARAMETER
            name: s
            type: Integer
        post_conditions:
          Post: 'Result = s >= 0 and s < Seconds_in_minute'
        result: !P_BMM_SIMPLE_TYPE
          type: Boolean
      valid_fractional_second:
        name: valid_fractional_second
        documentation: 'True if fs >= 0.0 and fs < 1.0 .'
        parameters:
          fs: !P_BMM_SINGLE_FUNCTION_PARAMETER
            name: fs
            type: Double
        post_conditions:
          Post: 'Result = fs >= 0.0 and fs < 1.0 .'
        result: !P_BMM_SIMPLE_TYPE
          type: Boolean
      valid_iso8601_date:
        name: valid_iso8601_date
        documentation: |-
          String is a valid ISO 8601 date, i.e. takes the complete form:

          * `YYYY-MM-DD` (extended, preferred) or one of the partial forms `YYYY-MM` or `YYYY`
          * `YYYYMMDD` (compact) or a partial variant `YYYYMM`.

          Where:

          * `YYYY` is the string form of any positive number in the range `0000` - `9999` (zero-filled to four digits)
          * `MM` is `01` - `12` (zero-filled to two digits)
          * `DD` is `01` - `31` (zero-filled to two digits)

          The combinations of `YYYY`, `MM`, `DD` numbers must be correct with respect to the Gregorian calendar.
        parameters:
          s: !P_BMM_SINGLE_FUNCTION_PARAMETER
            name: s
            type: String
        result: !P_BMM_SIMPLE_TYPE
          type: Boolean
      valid_iso8601_time:
        name: valid_iso8601_time
        documentation: |
          String is a valid ISO 8601 date, i.e. takes the form:

          * `hh:mm:ss[(,|.)s+][Z|±hh[:mm]]` (extended)
          * `hhmmss[(,|.)s+][Z|±hh[mm]]` (compact)
          * or one of the partial forms:
          ** `hh:mm` (extended)
          ** `hhmm` or `hh` (compact)

          with an additional optional timezone indicator of:

          * `Z` or`±hh[:mm]` (extended)  `±hh[mm]` (compact)

          Where:

          * `hh` is "00" - "23" (0-filled to two digits)
          * `mm` is "00" - "59" (0-filled to two digits)
          * `ss` is "00" - "60" (0-filled to two digits)
          * `[(,|.)s+]` is an optional string consisting of a comma or decimal point followed by numeric string of 1 or more digits, representing a fractional second
          * `Z` is a literal meaning UTC (modern replacement for GMT), i.e. timezone `+0000`
        parameters:
          s: !P_BMM_SINGLE_FUNCTION_PARAMETER
            name: s
            type: String
        result: !P_BMM_SIMPLE_TYPE
          type: Boolean
      valid_iso8601_date_time:
        name: valid_iso8601_date_time
        documentation: |-
          String is a valid ISO 8601 date-time, i.e. takes the form:

          * `YYYY-MM-DDThh:mm:ss[(,|.)s+][Z|±hh[:mm]]` (extended)
          * `YYYYMMDDThhmmss[(,|.)s+][Z|±hh[mm]]` (compact)
          * or one of the partial forms:
          ** `YYYY-MM-DDThh:mm` or `YYYY-MM-DDThh` (extended)
          ** `YYYYMMDDThhmm` or `YYYYMMDDThh` (compact)
        parameters:
          s: !P_BMM_SINGLE_FUNCTION_PARAMETER
            name: s
            type: String
        result: !P_BMM_SIMPLE_TYPE
          type: Boolean
      valid_iso8601_duration:
        name: valid_iso8601_duration
        documentation: |-
          String is a valid ISO 8601 duration, i.e. takes the form:

          * `P[nnY][nnM][nnW][nnD][T[nnH][nnM][nnS]]`

          Where each nn represents a number of years, months, etc. nnW represents a number of 7-day weeks.

          Note: allowing the `W` designator in the same expression as other designators is an exception to the published standard, but necessary in clinical information (typically for representing pregnancy duration).
        parameters:
          s: !P_BMM_SINGLE_FUNCTION_PARAMETER
            name: s
            documentation: |-
              String is a valid ISO 8601 duration, i.e. takes the form:

              * `P[nnY][nnM][nnW][nnD][T[nnH][nnM][nnS]]`

              Where each `nn` represents a number of years, months, etc. `nnW` represents a number of 7- day weeks.

              NOTE: allowing the `W` designator in the same expression as other designators is an exception to the published standard, but necessary in clinical information (typically for representing pregnancy duration).
            type: String
        result: !P_BMM_SIMPLE_TYPE
          type: Boolean
  Proper_interval:
    name: Proper_interval
    documentation: "Type representing a 'proper' Interval, i.e. any two-sided or one-sided interval."
    ancestors:
      - Interval
    generic_parameter_defs:
      T:
        name: T
        conforms_to_type: Ordered
    invariants:
      Inv_not_point: 'lower /= upper'
  Point_interval:
    name: Point_interval
    documentation: 'Type representing an Interval that happens to be a point value. Provides an efficient representation that is substitutable for `Interval<T>` where needed.'
    ancestors:
      - Interval
    generic_parameter_defs:
      T:
        name: T
        conforms_to_type: Ordered
    properties:
      lower_unbounded: !P_BMM_SINGLE_PROPERTY
        name: lower_unbounded
        documentation: 'lower boundary open (i.e. = -infinity)'
        is_mandatory: true
        type: Boolean
        default: false
      upper_unbounded: !P_BMM_SINGLE_PROPERTY
        name: upper_unbounded
        documentation: 'upper boundary open (i.e. = +infinity)'
        is_mandatory: true
        type: Boolean
        default: false
      lower_included: !P_BMM_SINGLE_PROPERTY
        name: lower_included
        documentation: 'lower boundary value included in range if not lower_unbounded.'
        is_mandatory: true
        type: Boolean
        default: true
      upper_included: !P_BMM_SINGLE_PROPERTY
        name: upper_included
        documentation: 'upper boundary value included in range if not upper_unbounded.'
        is_mandatory: true
        type: Boolean
        default: true
    invariants:
      Inv_point: 'lower = upper'
  AUTHORED_RESOURCE:
    name: AUTHORED_RESOURCE
    documentation: |
      Abstract idea of an online resource created by a human author. 
    is_abstract: true
    properties:
      uid: !P_BMM_SINGLE_PROPERTY
        name: uid
        documentation: 'Unique identifier of the family of archetypes having the same interface identifier (same major version).'
        type: UUID
      original_language: !P_BMM_SINGLE_PROPERTY
        name: original_language
        documentation: 'Language in which this resource was initially authored. Although there is no language primacy of resources overall, the language of original authoring is required to ensure natural language translations can preserve quality. Language is relevant in both the description and ontology sections. '
        is_mandatory: true
        type: Terminology_code
      description: !P_BMM_SINGLE_PROPERTY
        name: description
        documentation: 'Description and lifecycle information of the resource.'
        type: RESOURCE_DESCRIPTION
      is_controlled: !P_BMM_SINGLE_PROPERTY
        name: is_controlled
        documentation: 'True if this resource is under any kind of change control (even file copying), in which case revision history is created. '
        type: Boolean
      annotations: !P_BMM_SINGLE_PROPERTY
        name: annotations
        documentation: 'Annotations on individual items within the resource, keyed by path. The inner table takes the form of a Hash table of String values keyed by String tags.'
        type: RESOURCE_ANNOTATIONS
      translations: !P_BMM_GENERIC_PROPERTY
        name: translations
        documentation: 'List of details for each natural translation made of this resource, keyed by language code. For each translation listed here, there must be corresponding sections in all language-dependent parts of the resource. The `_original_language_` does not appear in this list.'
        type_def:
          root_type: Hash
          generic_parameters:
            - String
            - TRANSLATION_DETAILS
    functions:
      current_revision:
        name: current_revision
        documentation: 'Most recent revision in revision_history if is_controlled else  (uncontrolled) . '
        post_conditions:
          Post: 'Result = revision_history.most_recent_version'
        result: !P_BMM_SIMPLE_TYPE
          type: String
      languages_available:
        name: languages_available
        documentation: 'Total list of languages available in this resource, derived from original_language and translations. '
        result: !P_BMM_CONTAINER_TYPE
          container_type: List
          type: String
    invariants:
      Original_language_valid: 'code_set (Code_set_id_languages).has_code (original_language.as_string)'
      Current_revision_valid: '(current_revision /= Void and not is_controlled) implies current_revision.is_equal ("(uncontrolled)")'
      Translations_valid: 'translations /= Void implies (not translations.is_empty and not translations.has (orginal_language.code_string))'
      Description_valid: |-
        translations /= Void implies (description.details.for_all (d &#124;
        translations.has_key (d.language.code_string)))
      Languages_available_valid: 'languages_available.has (original_language)'
      Revision_history_valid: 'is_controlled xor revision_history = Void'
  RESOURCE_DESCRIPTION:
    name: RESOURCE_DESCRIPTION
    documentation: 'Defines the descriptive meta-data of a resource.'
    properties:
      original_author: !P_BMM_GENERIC_PROPERTY
        name: original_author
        documentation: 'Original author of this resource, with all relevant details, including organisation.'
        is_mandatory: true
        type_def:
          root_type: Hash
          generic_parameters:
            - String
            - String
      original_namespace: !P_BMM_SINGLE_PROPERTY
        name: original_namespace
        documentation: "Namespace of original author's organisation, in reverse internet form, if applicable."
        type: String
      original_publisher: !P_BMM_SINGLE_PROPERTY
        name: original_publisher
        documentation: 'Plain text name of organisation that originally published this artefact, if any.'
        type: String
      other_contributors: !P_BMM_CONTAINER_PROPERTY
        name: other_contributors
        documentation: 'Other contributors to the resource, each listed in "name <email>"  form. '
        type_def:
          container_type: List
          type: String
        cardinality:
          lower: 0
          upper_unbounded: true
      lifecycle_state: !P_BMM_SINGLE_PROPERTY
        name: lifecycle_state
        documentation: 'Lifecycle state of the resource, typically including states such as: initial, in_development, in_review, published, superseded, obsolete. '
        is_mandatory: true
        type: Terminology_code
      parent_resource: !P_BMM_SINGLE_PROPERTY
        name: parent_resource
        documentation: 'Reference to owning resource. '
        is_mandatory: true
        type: AUTHORED_RESOURCE
        default: ''
      custodian_namespace: !P_BMM_SINGLE_PROPERTY
        name: custodian_namespace
        documentation: 'Namespace in reverse internet id form, of current custodian organisation.'
        type: String
      custodian_organisation: !P_BMM_SINGLE_PROPERTY
        name: custodian_organisation
        documentation: 'Plain text name of current custodian organisation.'
        type: String
      copyright: !P_BMM_SINGLE_PROPERTY
        name: copyright
        documentation: |
          Optional copyright statement for the resource as a knowledge resource. 
        type: String
      licence: !P_BMM_SINGLE_PROPERTY
        name: licence
        documentation: 'Licence of current artefact, in format "short licence name <URL of licence>", e.g. "Apache 2.0 License <http://www.apache.org/licenses/LICENSE-2.0.html>"'
        type: String
      ip_acknowledgements: !P_BMM_GENERIC_PROPERTY
        name: ip_acknowledgements
        documentation: |-
          List of acknowledgements of other IP directly referenced in this archetype, typically terminology codes, ontology ids etc. Recommended keys are the widely known name or namespace for the IP source, as shown in the following example:

          ----
          ip_acknowledgements = <
              ["loinc"] = <"This content from LOINC® is copyright © 1995 Regenstrief Institute, Inc. and the LOINC Committee, and available at no cost under the license at http://loinc.org/terms-of-use">
              ["snomedct"] = <"Content from SNOMED CT® is copyright © 2007 IHTSDO <ihtsdo.org>">
          >
          ----
        type_def:
          root_type: Hash
          generic_parameters:
            - String
            - String
      references: !P_BMM_GENERIC_PROPERTY
        name: references
        documentation: 'List of references of material on which this artefact is based, as a keyed list of strings. The keys should be in a standard citation format.'
        type_def:
          root_type: Hash
          generic_parameters:
            - String
            - String
      resource_package_uri: !P_BMM_SINGLE_PROPERTY
        name: resource_package_uri
        documentation: 'URI of package to which this resource belongs.'
        type: String
      conversion_details: !P_BMM_GENERIC_PROPERTY
        name: conversion_details
        documentation: |-
          Details related to conversion process that generated this model from an original, if relevant, as a list of name/value pairs. Typical example with recommended tags:

          ----
          conversion_details = <
              ["source_model"] = <"CEM model xyz <http://location.in.clinicalelementmodels.com>">
              ["tool"] = <"cem2adl v6.3.0">
              ["time"] = <"2014-11-03T09:05:00">
          >
          ----
        type_def:
          root_type: Hash
          generic_parameters:
            - String
            - String
      other_details: !P_BMM_GENERIC_PROPERTY
        name: other_details
        documentation: 'Additional non-language-sensitive resource meta-data, as a list of name/value pairs.'
        type_def:
          root_type: Hash
          generic_parameters:
            - String
            - String
      details: !P_BMM_GENERIC_PROPERTY
        name: details
        documentation: 'Details of all parts of resource description that are natural language-dependent, keyed by language code.'
        type_def:
          root_type: Hash
          generic_parameters:
            - String
            - RESOURCE_DESCRIPTION_ITEM
  TRANSLATION_DETAILS:
    name: TRANSLATION_DETAILS
    documentation: 'Class providing details of a natural language translation. '
    properties:
      language: !P_BMM_SINGLE_PROPERTY
        name: language
        documentation: 'Language of the translation, coded using ISO 639-1 (2 character) language codes.'
        is_mandatory: true
        type: Terminology_code
      author: !P_BMM_GENERIC_PROPERTY
        name: author
        documentation: 'Translator name and other demographic details.'
        is_mandatory: true
        type_def:
          root_type: Hash
          generic_parameters:
            - String
            - String
      accreditaton: !P_BMM_SINGLE_PROPERTY
        name: accreditaton
        documentation: "Accreditation of translator, usually a national translator's registration or association membership id."
        type: String
      other_details: !P_BMM_GENERIC_PROPERTY
        name: other_details
        documentation: 'Any other meta-data.'
        type_def:
          root_type: Hash
          generic_parameters:
            - String
            - String
      version_last_translated: !P_BMM_SINGLE_PROPERTY
        name: version_last_translated
        documentation: 'Version of this resource last time it was translated into the language represented by this `TRANSLATION_DETAILS` object.'
        type: String
  RESOURCE_DESCRIPTION_ITEM:
    name: RESOURCE_DESCRIPTION_ITEM
    documentation: 'Language-specific detail of resource description. When a resource is translated for use in another language environment, each `RESOURCE_DESCRIPTION_ITEM` needs to be copied and translated into the new language.'
    properties:
      language: !P_BMM_SINGLE_PROPERTY
        name: language
        documentation: 'The localised language in which the items in this description item are written. Coded using ISO 639-1 (2 character) language codes.'
        is_mandatory: true
        type: Terminology_code
      purpose: !P_BMM_SINGLE_PROPERTY
        name: purpose
        documentation: 'Purpose of the resource.'
        is_mandatory: true
        type: String
      keywords: !P_BMM_CONTAINER_PROPERTY
        name: keywords
        documentation: |
          Keywords which characterise this resource, used e.g. for indexing and searching. 
        type_def:
          container_type: List
          type: String
        cardinality:
          lower: 0
          upper_unbounded: true
      use: !P_BMM_SINGLE_PROPERTY
        name: use
        documentation: |
          Description of the uses of the resource, i.e. contexts in which it could be used. 
        type: String
      misuse: !P_BMM_SINGLE_PROPERTY
        name: misuse
        documentation: 'Description of any misuses of the resource, i.e. contexts in which it should not be used.'
        type: String
      original_resource_uri: !P_BMM_GENERIC_PROPERTY
        name: original_resource_uri
        documentation: 'URIs of original clinical document(s) or description of which resource is a formalisation, in the language of this description item; keyed by meaning.'
        type_def:
          root_type: Hash
          generic_parameters:
            - String
            - String
      other_details: !P_BMM_GENERIC_PROPERTY
        name: other_details
        documentation: 'Additional language-sensitive resource metadata, as a list of name/value pairs. '
        type_def:
          root_type: Hash
          generic_parameters:
            - String
            - String
  RESOURCE_ANNOTATIONS:
    name: RESOURCE_ANNOTATIONS
    documentation: |
      Object representing annotations on an archetype. These can be of various forms, with a documentation form defined so far, which has a multi-level tabular structure [ [ [String value, String key], path key], language key]. Example instance, showing the documentation structure.

      --------
          documentation = <
              ["en"] = <
                 ["/data[id2]"] = <
                     ["ui"] = <"passthrough">
                 >
                 ["/data[id2]/items[id3]"] = <
                     ["design note"] = <"this is a design note on Statement">
                     ["requirements note"] = <"this is a requirements note on Statement">
                     ["medline ref"] = <"this is a medline ref on Statement">
                 >
              >
          >
      --------

      Other sub-structures might have different keys, e.g.  based on programming languages, UI toolkits etc.
    properties:
      documentation: !P_BMM_GENERIC_PROPERTY
        name: documentation
