bmm_version: '2.4'
rm_publisher: openehr
schema_name: lang
rm_release: 1.1.0
schema_revision: 1.1.0.2
schema_lifecycle_state: stable
schema_description: lang
schema_author: 'Thomas Beale <thomas.beale@openehr.org>, code-generator'
packages:
  org.openehr.lang.bmm:
    name: org.openehr.lang.bmm
    packages:
      model_access:
        name: model_access
        classes:
          - BMM_MODEL_ACCESS
          - BMM_SCHEMA_DESCRIPTOR
          - BMM_SCHEMA
          - BMM_INCLUDE_SPEC
          - BMM_SCHEMA_METADATA_KEY
          - BMM_SCHEMA_STATE
      core:
        name: core
        packages:
          entity:
            name: entity
            packages:
              range_constrained:
                name: range_constrained
                classes:
                  - BMM_VALUE_SET_SPEC
                  - BMM_ENUMERATION
                  - BMM_ENUMERATION_INTEGER
                  - BMM_ENUMERATION_STRING
            classes:
              - BMM_CLASS
              - BMM_CONTAINER_TYPE
              - BMM_EFFECTIVE_TYPE
              - BMM_MODEL_TYPE
              - BMM_GENERIC_CLASS
