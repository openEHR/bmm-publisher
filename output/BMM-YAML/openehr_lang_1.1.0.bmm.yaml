    properties:
      type_name: !P_BMM_SINGLE_PROPERTY
        name: type_name
        is_mandatory: true
        type: String
        default: '"Terminology_code"'
      type_anchor: !P_BMM_SINGLE_PROPERTY
        name: type_anchor
        is_mandatory: true
        type: Terminology_code
  TYPE_DEF_TIME:
    name: TYPE_DEF_TIME
    documentation: 'Rules meta-type representing the primitive type Time.'
    ancestors:
