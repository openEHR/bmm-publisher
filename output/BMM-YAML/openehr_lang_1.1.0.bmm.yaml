      statement:
        name: statement
        classes:
          - BMM_ACTION_DECISION_TABLE
          - BMM_ACTION_TABLE
          - BMM_ASSIGNMENT
          - BMM_ASSERTION
          - BMM_PROCEDURE_CALL
          - BMM_STATEMENT_ITEM
          - BMM_STATEMENT
          - BMM_STATEMENT_BLOCK
          - BMM_SIMPLE_STATEMENT
          - BMM_DECLARATION
    classes:
      - BMM_DEFINITIONS
  org.openehr.lang.bmm_persistence:
    name: org.openehr.lang.bmm_persistence
    classes:
      - P_BMM_CLASS
      - P_BMM_ENUMERATION
      - P_BMM_SCHEMA
      - P_BMM_PROPERTY
      - P_BMM_GENERIC_PARAMETER
      - P_BMM_TYPE
      - P_BMM_CONTAINER_TYPE
      - P_BMM_SIMPLE_TYPE
      - P_BMM_OPEN_TYPE
      - P_BMM_GENERIC_TYPE
      - P_BMM_PACKAGE
      - P_BMM_PACKAGE_CONTAINER
      - P_BMM_CONTAINER_PROPERTY
      - P_BMM_SINGLE_PROPERTY
      - P_BMM_SINGLE_PROPERTY_OPEN
      - P_BMM_GENERIC_PROPERTY
      - P_BMM_ENUMERATION_INTEGER
      - P_BMM_ENUMERATION_STRING
      - P_BMM_MODEL_ELEMENT
      - P_BMM_BASE_TYPE
      - P_BMM_SCHEMA_DESCRIPTOR
      - P_BMM_INDEXED_CONTAINER_PROPERTY
      - P_BMM_INDEXED_CONTAINER_TYPE
  org.openehr.lang.beom:
    name: org.openehr.lang.beom
    packages:
      core:
        name: core
        classes:
          - ASSERTION
          - ASSIGNMENT
          - EXPR_BINARY_OPERATOR
          - EXPR_FUNCTION_CALL
          - EXPRESSION
          - EXPR_LEAF
          - EXPR_LITERAL
