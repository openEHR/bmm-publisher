    properties:
      type_name: !P_BMM_SINGLE_PROPERTY
        name: type_name
        is_mandatory: true
        type: String
        default: '"Integer"'
      type_anchor: !P_BMM_SINGLE_PROPERTY
        name: type_anchor
        is_mandatory: true
        type: Integer
  TYPE_DEF_OBJECT_REF:
    name: TYPE_DEF_OBJECT_REF
    documentation: 'Rules meta-type representing the type Object_ref, which is assumed to by the type of any non-primitive reference target within a rule.'
    ancestors:
      - EXPR_TYPE_DEF
    properties:
      type_name: !P_BMM_SINGLE_PROPERTY
        name: type_name
        is_mandatory: true
        type: String
        default: '"Object_ref"'
  TYPE_DEF_REAL:
    name: TYPE_DEF_REAL
    documentation: 'Rules meta-type representing the primitive type Real.'
    ancestors:
      - EXPR_TYPE_DEF
    properties:
      type_name: !P_BMM_SINGLE_PROPERTY
        name: type_name
        is_mandatory: true
        type: String
        default: '"Real"'
      type_anchor: !P_BMM_SINGLE_PROPERTY
        name: type_anchor
        is_mandatory: true
        type: Real
  TYPE_DEF_STRING:
    name: TYPE_DEF_STRING
    documentation: 'Rules meta-type representing the primitive type String.'
    ancestors:
      - EXPR_TYPE_DEF
    properties:
      type_name: !P_BMM_SINGLE_PROPERTY
        name: type_name
        is_mandatory: true
        type: String
        default: '"String"'
      type_anchor: !P_BMM_SINGLE_PROPERTY
        name: type_anchor
        is_mandatory: true
        type: String
  TYPE_DEF_TERMINOLOGY_CODE:
    name: TYPE_DEF_TERMINOLOGY_CODE
    documentation: 'Rules meta-type representing the primitive type Terminology_code.'
    ancestors:
