              - BMM_ROUTINE_TYPE
              - BMM_PROPERTY_TYPE
              - BMM_ENTITY_METATYPE
          feature:
            name: feature
            classes:
              - BMM_CONSTANT
              - BMM_CONTAINER_PROPERTY
              - BMM_FUNCTION
              - BMM_LOCAL
              - BMM_OPERATOR
              - BMM_PROPERTY
              - BMM_ROUTINE
              - BMM_PARAMETER
              - BMM_VARIABLE
              - BMM_PROCEDURE
              - BMM_UNITARY_PROPERTY
              - BMM_INDEXED_CONTAINER_PROPERTY
              - BMM_INSTANTIABLE_FEATURE
              - BMM_RESULT
              - BMM_FEATURE_EXTENSION
              - BMM_ROUTINE_DEFINITION
              - BMM_EXTERNAL_ROUTINE
              - BMM_FEATURE_GROUP
              - BMM_VISIBILITY
              - BMM_FEATURE
              - BMM_SELF
              - BMM_WRITABLE_VARIABLE
              - BMM_READONLY_VARIABLE
              - BMM_SINGLETON
              - BMM_STATIC
              - BMM_LOCAL_ROUTINE
              - BMM_OPERATOR_POSITION
              - BMM_PARAMETER_DIRECTION
          literal_value:
            name: literal_value
            classes:
              - BMM_INTEGER_VALUE
              - BMM_STRING_VALUE
              - BMM_LITERAL_VALUE
              - BMM_BOOLEAN_VALUE
              - BMM_PRIMITIVE_VALUE
              - BMM_CONTAINER_VALUE
              - BMM_UNITARY_VALUE
              - BMM_INDEXED_CONTAINER_VALUE
              - BMM_INTERVAL_VALUE
          model:
            name: model
            classes:
              - BMM_MODEL
              - BMM_MODEL_METADATA
              - BMM_PACKAGE
              - BMM_PACKAGE_CONTAINER
        classes:
          - BMM_MODEL_ELEMENT
          - BMM_FORMAL_ELEMENT
      expression:
        name: expression
        classes:
          - EL_BINARY_OPERATOR
          - EL_EXPRESSION
          - EL_LITERAL
          - EL_OPERATOR
          - EL_UNARY_OPERATOR
          - EL_PROPERTY_REF
          - EL_PREDICATE
          - EL_DEFINED
          - EL_FUNCTION_CALL
          - EL_AGENT_CALL
          - EL_AGENT
          - EL_TUPLE_ITEM
          - EL_PROCEDURE_AGENT
          - EL_TUPLE
          - EL_FUNCTION_AGENT
          - EL_ATTACHED
          - EL_VALUE_GENERATOR
          - EL_BOOLEAN_EXPRESSION
          - EL_TYPE_REF
          - EL_FEATURE_REF
          - EL_CONDITIONAL_EXPRESSION
          - EL_CONDITION_CHAIN
          - EL_CONSTRAINED
          - EL_CASE_TABLE
          - EL_CASE
          - EL_DECISION_TABLE
          - EL_DECISION_BRANCH
          - EL_VARIABLE
          - EL_TERMINAL
          - EL_SIMPLE
          - EL_STATIC_REF
          - EL_WRITABLE_VARIABLE
