    properties:
      type_name: !P_BMM_SINGLE_PROPERTY
        name: type_name
        is_mandatory: true
        type: String
        default: '"Time"'
      type_anchor: !P_BMM_SINGLE_PROPERTY
        name: type_anchor
        is_mandatory: true
